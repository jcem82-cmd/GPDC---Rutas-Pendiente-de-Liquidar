<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Centro de Comunicación · PDC Analytics Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════════════════════════════════════════════════════════
   PDC Analytics Center — Centro de Comunicación v2.0
   Solo el componente flotante. Sin full-screen.
   ════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
body{background:transparent;}

/* ══ BOTÓN FAB ══ */
.pdc-fab{
  position:fixed;
  bottom:24px;
  right:24px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#0ea5e9,#4f46e5);
  border:none;
  cursor:pointer;
  box-shadow:0 8px 32px rgba(14,165,233,.45), 0 2px 8px rgba(0,0,0,.3);
  z-index:9990;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .2s, box-shadow .2s;
  outline:none;
}
.pdc-fab:hover{
  transform:scale(1.10);
  box-shadow:0 12px 40px rgba(14,165,233,.6), 0 4px 12px rgba(0,0,0,.4);
}
.pdc-fab-avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.35rem;
  color:#fff;
  pointer-events:none;
}
.pdc-fab-badge{
  position:absolute;
  top:-3px;
  right:-3px;
  min-width:20px;
  height:20px;
  border-radius:10px;
  background:#ef4444;
  color:#fff;
  font-size:.62rem;
  font-weight:800;
  display:none;
  align-items:center;
  justify-content:center;
  padding:0 5px;
  border:2px solid #0a0f1e;
  pointer-events:none;
}
.pdc-fab-online{
  position:absolute;
  bottom:2px;
  left:2px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#10b981;
  border:2px solid #0a0f1e;
  box-shadow:0 0 8px #10b981;
  pointer-events:none;
}
.pdc-fab.hidden{display:none;}

/* ══ VENTANA FLOTANTE ══ */
.pdc-cc{
  position:fixed;
  bottom:24px;
  right:24px;
  width:460px;
  height:70vh;
  min-height:600px;
  max-height:800px;
  background:#0d1425;
  border:1px solid rgba(56,189,248,.22);
  border-radius:18px;
  box-shadow:0 32px 80px rgba(0,0,0,.75), 0 0 0 1px rgba(56,189,248,.08);
  display:flex;
  flex-direction:column;
  z-index:9991;
  overflow:hidden;
  transition:height .25s cubic-bezier(.4,0,.2,1);
}
.pdc-cc.minimized{height:60px !important; min-height:unset;}
.pdc-cc.hidden{display:none;}

/* Header */
.pdc-cc-hdr{
  background:linear-gradient(135deg,#001240 0%,#002060 60%,#0d1a4a 100%);
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:0 16px;
  height:60px;
  display:flex;
  align-items:center;
  gap:11px;
  flex-shrink:0;
  border-radius:18px 18px 0 0;
  user-select:none;
}
.pdc-cc.minimized .pdc-cc-hdr{border-radius:18px;}
.pdc-cc-hdr-avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:linear-gradient(135deg,#0ea5e9,#4f46e5);
  border:2px solid rgba(255,255,255,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.1rem;
  flex-shrink:0;
}
.pdc-cc-hdr-info{flex:1;min-width:0;}
.pdc-cc-hdr-title{font-size:.88rem;font-weight:700;color:#fff;white-space:nowrap;}
.pdc-cc-hdr-sub{font-size:.62rem;color:rgba(207,238,252,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdc-cc-hdr-online{
  width:8px;height:8px;border-radius:50%;
  background:#10b981;box-shadow:0 0 7px #10b981;flex-shrink:0;
}
.pdc-cc-hdr-badge{
  background:rgba(239,68,68,.9);color:#fff;font-size:.6rem;font-weight:800;
  padding:2px 7px;border-radius:10px;display:none;flex-shrink:0;
}
.pdc-cc-controls{display:flex;gap:5px;flex-shrink:0;}
.pdc-cc-btn{
  width:26px;height:26px;border-radius:7px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.65);
  font-size:.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.pdc-cc-btn:hover{background:rgba(255,255,255,.13);color:#fff;}
.pdc-cc-btn.x:hover{background:rgba(239,68,68,.22);border-color:rgba(239,68,68,.5);color:#f87171;}

/* Body */
.pdc-cc-body{
  display:flex;
  flex:1;
  overflow:hidden;
  min-height:0;
}
.pdc-cc.minimized .pdc-cc-body{display:none;}

/* Sidebar lista conversaciones */
.pdc-cc-sb{
  width:170px;
  border-right:1px solid rgba(255,255,255,.06);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
/* Para usuarios no-admin: ocultar sidebar */
.pdc-cc.role-user .pdc-cc-sb{display:none;}

.pdc-cc-sb-hdr{
  padding:10px 12px 8px;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.pdc-cc-sb-lbl{font-size:.6rem;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.3);text-transform:uppercase;}
.pdc-cc-unread-total{
  background:#ef4444;color:#fff;font-size:.58rem;font-weight:800;
  padding:1px 6px;border-radius:8px;display:none;
}
.pdc-cc-convs{flex:1;overflow-y:auto;}
.pdc-cc-convs::-webkit-scrollbar{width:2px;}
.pdc-cc-convs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);}
.pdc-cc-conv{
  padding:9px 11px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .15s;
  display:flex;
  align-items:center;
  gap:8px;
  position:relative;
}
.pdc-cc-conv:hover{background:rgba(255,255,255,.04);}
.pdc-cc-conv.active{background:rgba(56,189,248,.09);border-left:2px solid #38bdf8;}
.pdc-cc-avatar{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.7rem;color:#fff;flex-shrink:0;
}
.pdc-cc-conv-info{flex:1;min-width:0;}
.pdc-cc-conv-name{font-size:.73rem;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdc-cc-conv-prev{font-size:.6rem;color:rgba(255,255,255,.28);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdc-cc-conv-dot{
  position:absolute;right:7px;top:9px;
  width:7px;height:7px;border-radius:50%;
  background:#38bdf8;box-shadow:0 0 5px #38bdf8;
}

/* Panel chat */
.pdc-cc-chat{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
.pdc-cc-chat-hdr{
  padding:9px 13px;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:rgba(10,15,30,.6);
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:8px;
}
.pdc-cc-pane-dot{width:7px;height:7px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981;}
.pdc-cc-pane-name{font-size:.8rem;font-weight:700;color:#e2e8f0;}
.pdc-cc-pane-email{font-size:.62rem;color:rgba(255,255,255,.32);}
.pdc-cc-noconv{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;
}
.pdc-cc-noconv-ico{font-size:2rem;opacity:.18;}
.pdc-cc-noconv-txt{font-size:.74rem;color:rgba(255,255,255,.2);text-align:center;padding:0 14px;line-height:1.5;}

/* Mensajes */
.pdc-cc-msgs{
  flex:1;
  overflow-y:auto;
  padding:12px 13px;
  display:flex;
  flex-direction:column;
  gap:9px;
  min-height:0;
}
.pdc-cc-msgs::-webkit-scrollbar{width:3px;}
.pdc-cc-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.pdc-msg{max-width:84%;display:flex;flex-direction:column;gap:2px;}
.pdc-msg.user{align-self:flex-start;}
.pdc-msg.admin{align-self:flex-end;}
.pdc-msg-bubble{
  padding:9px 12px;border-radius:14px;
  font-size:.78rem;line-height:1.5;word-break:break-word;
}
.pdc-msg.user .pdc-msg-bubble{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.07);
  color:#e2e8f0;
  border-radius:3px 14px 14px 14px;
}
.pdc-msg.admin .pdc-msg-bubble{
  background:linear-gradient(135deg,#1d4ed8,#4f46e5);
  color:#fff;
  border-radius:14px 3px 14px 14px;
}
.pdc-msg-meta{font-size:.57rem;color:rgba(255,255,255,.28);}
.pdc-msg.admin .pdc-msg-meta{text-align:right;}

/* Input */
.pdc-cc-input-row{
  padding:10px 12px;
  border-top:1px solid rgba(255,255,255,.06);
  background:#0d1425;
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.pdc-cc-inp{
  flex:1;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.11);
  border-radius:10px;
  color:#fff;
  font-family:inherit;
  font-size:.79rem;
  padding:9px 12px;
  outline:none;
  resize:none;
  transition:border-color .2s;
  max-height:76px;
}
.pdc-cc-inp:focus{border-color:#38bdf8;}
.pdc-cc-inp::placeholder{color:rgba(255,255,255,.22);}
.pdc-cc-send{
  background:linear-gradient(135deg,#0ea5e9,#4f46e5);
  border:none;border-radius:10px;
  color:#fff;font-weight:700;
  padding:9px 15px;cursor:pointer;
  font-size:.8rem;white-space:nowrap;
  font-family:inherit;
  transition:transform .15s, box-shadow .15s;
}
.pdc-cc-send:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,165,233,.4);}
.pdc-cc-send:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* ══ TOAST ALERTA ══ */
.pdc-toast{
  position:fixed;top:18px;right:18px;z-index:9999;
  background:linear-gradient(135deg,#0ea5e9,#4f46e5);
  color:#fff;padding:13px 17px;border-radius:14px;
  font-size:.82rem;max-width:340px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:none;gap:11px;align-items:center;cursor:pointer;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
}
.pdc-toast.show{display:flex;animation:toastIn .4s cubic-bezier(.16,1,.3,1);}
@keyframes toastIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:none}}

@media(max-width:860px){
  .pdc-cc{width:calc(100vw - 40px);max-width:none;}
  .pdc-cc-sb{width:130px;}
}
@media(max-width:520px){
  .pdc-cc-sb{display:none !important;}
}
</style>
</head>
<body>

<!-- ══ TOAST ALERTA ══ -->
<div class="pdc-toast" id="pdcToast">
  <span style="font-size:1.3rem;flex-shrink:0;">💬</span>
  <div>
    <div style="font-weight:700;margin-bottom:2px;">Nuevo mensaje</div>
    <div id="pdcToastText" style="opacity:.85;font-size:.76rem;"></div>
  </div>
  <span style="margin-left:auto;opacity:.45;font-size:.85rem;">✕</span>
</div>

<!-- ══ BOTÓN FAB ══ -->
<button class="pdc-fab hidden" id="pdcFab" onclick="ccOpen()" title="Abrir Centro de Comunicación">
  <div class="pdc-fab-avatar">💬</div>
  <span class="pdc-fab-badge" id="pdcFabBadge"></span>
  <span class="pdc-fab-online"></span>
</button>

<!-- ══ VENTANA FLOTANTE — CENTRO DE COMUNICACIÓN ══ -->
<div class="pdc-cc hidden" id="pdcCC">

  <!-- Header -->
  <div class="pdc-cc-hdr">
    <div class="pdc-cc-hdr-avatar">💬</div>
    <div class="pdc-cc-hdr-info">
      <div class="pdc-cc-hdr-title">Centro de Comunicación</div>
      <div class="pdc-cc-hdr-sub">Mensajería · Soporte · PDC Analytics Center</div>
    </div>
    <div class="pdc-cc-hdr-online"></div>
    <span class="pdc-cc-hdr-badge" id="pdcHdrBadge"></span>
    <div class="pdc-cc-controls">
      <button class="pdc-cc-btn" onclick="ccMinimize()" title="Minimizar">─</button>
      <button class="pdc-cc-btn x" onclick="ccClose()" title="Cerrar">✕</button>
    </div>
  </div>

  <!-- Body -->
  <div class="pdc-cc-body">

    <!-- Sidebar conversaciones (solo admin ve múltiples convs) -->
    <div class="pdc-cc-sb" id="pdcSidebar">
      <div class="pdc-cc-sb-hdr">
        <span class="pdc-cc-sb-lbl">Usuarios</span>
        <span class="pdc-cc-unread-total" id="pdcSbUnread"></span>
      </div>
      <div class="pdc-cc-convs" id="pdcConvList">
        <div style="padding:12px 11px;font-size:.7rem;color:rgba(255,255,255,.22);">Cargando...</div>
      </div>
    </div>

    <!-- Panel chat -->
    <div class="pdc-cc-chat" id="pdcChatPane">
      <div class="pdc-cc-noconv" id="pdcNoConv">
        <div class="pdc-cc-noconv-ico">💬</div>
        <div class="pdc-cc-noconv-txt">Selecciona una conversación para responder</div>
      </div>
    </div>

  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   PDC Analytics Center — Centro de Comunicación v2.0
   CR-002 — Una sola interfaz para todos los roles
   ════════════════════════════════════════════════════════ */

const { createClient } = supabase;
const sb = createClient(
  'https://pytsrgtcjytjztwdlvux.supabase.co',
  'sb_publishable_mW5PeN4eRbl56zLlTP-vVg_NzCJTTfj'
);

/* ── Estado global ── */
let currentUser  = null;
let activeEmail  = null;
let activeNombre = null;
let toastTimer   = null;
let fabUnread    = 0;
let headerUnread = 0;
let isMinimized  = false;
let isClosed     = true;   // arranca cerrado, FAB visible

/* ── Autenticación ── */
(function init(){
  const raw = sessionStorage.getItem('pdc_session') || sessionStorage.getItem('pdc_user');
  if(!raw){ window.location.replace('login.html'); return; }
  try { currentUser = JSON.parse(raw); } catch(e){ window.location.replace('login.html'); return; }
  if(!currentUser){ window.location.replace('login.html'); return; }

  /* Normalizar campo rol */
  if(!currentUser.rol && currentUser.role) currentUser.rol = currentUser.role;
  if(!currentUser.email && currentUser.sender_email) currentUser.email = currentUser.sender_email;

  /* Modo usuario no-admin: ocultar sidebar, abrir directamente su conversación */
  const isAdmin = currentUser.rol === 'admin';
  if(!isAdmin){
    document.getElementById('pdcCC').classList.add('role-user');
  }

  /* Mostrar FAB */
  document.getElementById('pdcFab').classList.remove('hidden');

  /* Iniciar polling y realtime */
  if(isAdmin){
    loadConversations();
    setInterval(loadConversations, 5000);
  } else {
    /* Usuario: abrir su propia conversación automáticamente al abrir el CC */
    loadConversations();
    setInterval(loadConversations, 5000);
  }

  /* Realtime */
  sb.channel('pdc-cc-realtime').on('postgres_changes',
    {event:'INSERT', schema:'public', table:'chat_messages'},
    async (payload) => {
      const m = payload.new;
      if(isAdmin){
        if(m.sender_role !== 'admin'){
          playAlert();
          showToast(m.sender_nombre + ': ' + m.message.substring(0,55) + '…', m.sender_email);
          loadConversations();
          if(activeEmail === m.sender_email) await loadMessages(activeEmail);
        } else if(activeEmail && m.sender_email === activeEmail){
          await loadMessages(activeEmail);
        }
      } else {
        /* Usuario: recibe respuesta del admin */
        if(m.sender_role === 'admin' && m.sender_email === currentUser.email){
          playAlert();
          showToast('Administración PDC: ' + m.message.replace(/^\[To:[^\]]+\]\s*/,'').substring(0,55) + '…', null);
          if(activeEmail === currentUser.email) await loadMessages(currentUser.email);
        }
      }
    }
  ).subscribe();

})();

/* ── Controles FAB / Ventana ── */
function ccOpen(){
  isClosed = false; isMinimized = false;
  document.getElementById('pdcCC').classList.remove('hidden','minimized');
  document.getElementById('pdcFab').classList.add('hidden');
  fabUnread = 0;
  document.getElementById('pdcFabBadge').style.display = 'none';

  /* Si usuario no-admin: abrir su conversación directamente */
  if(currentUser.rol !== 'admin' && !activeEmail){
    openConv(currentUser.email);
  }
}
function ccMinimize(){
  isMinimized = !isMinimized;
  document.getElementById('pdcCC').classList.toggle('minimized', isMinimized);
}
function ccClose(){
  isClosed = true; isMinimized = false;
  document.getElementById('pdcCC').classList.add('hidden');
  document.getElementById('pdcFab').classList.remove('hidden');
}

/* ── Audio ── */
function playAlert(){
  try{
    const ctx = new(window.AudioContext||window.webkitAudioContext)();
    [880,660,440].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(0.22, ctx.currentTime+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.12+0.22);
      o.start(ctx.currentTime+i*0.12);
      o.stop(ctx.currentTime+i*0.12+0.22);
    });
  }catch(e){}
}

/* ── Toast ── */
function showToast(text, email){
  const toast = document.getElementById('pdcToast');
  document.getElementById('pdcToastText').textContent = text;
  toast.classList.add('show');
  toast.onclick = ()=>{ dismissToast(); if(email) openConv(email); else if(isClosed) ccOpen(); };
  clearTimeout(toastTimer);
  toastTimer = setTimeout(dismissToast, 6000);

  /* Badge FAB si está cerrado */
  if(isClosed){
    fabUnread++;
    const badge = document.getElementById('pdcFabBadge');
    badge.textContent = fabUnread > 9 ? '9+' : fabUnread;
    badge.style.display = 'flex';
  }

  /* Badge header */
  headerUnread++;
  const hb = document.getElementById('pdcHdrBadge');
  hb.textContent = headerUnread > 9 ? '9+' : headerUnread;
  hb.style.display = 'flex';
}
function dismissToast(){ document.getElementById('pdcToast').classList.remove('show'); }

/* ── Cargar conversaciones (admin: lista / usuario: la suya) ── */
async function loadConversations(){
  const isAdmin = currentUser.rol === 'admin';

  if(isAdmin){
    const { data } = await sb.from('chat_messages')
      .select('sender_email,sender_nombre,sender_role,message,created_at,is_read')
      .order('created_at',{ascending:false});
    if(!data) return;

    const map = {};
    data.forEach(m=>{
      if(m.sender_role === 'admin') return;
      if(!map[m.sender_email]){
        map[m.sender_email] = {nombre:m.sender_nombre, lastMsg:m.message, lastTime:m.created_at, unread:0};
      }
      if(!m.is_read) map[m.sender_email].unread++;
    });

    const emails = Object.keys(map);
    const convList = document.getElementById('pdcConvList');

    if(!emails.length){
      convList.innerHTML = '<div style="padding:12px 11px;font-size:.7rem;color:rgba(255,255,255,.22);">Sin mensajes aún</div>';
      return;
    }

    let totalUnread = 0;
    convList.innerHTML = emails.map(email=>{
      const c = map[email];
      totalUnread += c.unread;
      const ini = c.nombre.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
      return `<div class="pdc-cc-conv ${activeEmail===email?'active':''}" onclick="openConv('${email}')">
        <div class="pdc-cc-avatar">${ini}</div>
        <div class="pdc-cc-conv-info">
          <div class="pdc-cc-conv-name">${c.nombre}</div>
          <div class="pdc-cc-conv-prev">${c.lastMsg.replace(/^\[To:[^\]]+\]\s*/,'')}</div>
        </div>
        ${c.unread>0?'<div class="pdc-cc-conv-dot"></div>':''}
      </div>`;
    }).join('');

    const sb_badge = document.getElementById('pdcSbUnread');
    if(totalUnread > 0){ sb_badge.textContent = totalUnread; sb_badge.style.display='flex'; }
    else { sb_badge.style.display='none'; }

  } else {
    /* Usuario no-admin: si ya hay conversación activa, recargar mensajes */
    if(activeEmail) await loadMessages(activeEmail);
  }
}

/* ── Abrir conversación ── */
async function openConv(email){
  /* Para usuario no-admin, siempre su propio email */
  const isAdmin = currentUser.rol === 'admin';
  if(!isAdmin) email = currentUser.email;

  /* Buscar nombre */
  let nombre = email;
  if(isAdmin){
    const item = document.querySelector(`.pdc-cc-conv[onclick="openConv('${email}')"] .pdc-cc-conv-name`);
    if(item) nombre = item.textContent;
  } else {
    nombre = currentUser.nombre || currentUser.email;
  }

  activeEmail  = email;
  activeNombre = nombre;

  /* Marcar leídos (admin) */
  if(isAdmin){
    await sb.from('chat_messages')
      .update({is_read:true})
      .eq('sender_email', email)
      .eq('sender_role','user')
      .eq('is_read', false);
    loadConversations();
  }

  /* Resetear badge header al abrir */
  headerUnread = 0;
  document.getElementById('pdcHdrBadge').style.display = 'none';

  /* Inyectar panel chat */
  const pane = document.getElementById('pdcChatPane');
  pane.innerHTML = `
    <div class="pdc-cc-chat-hdr">
      <div class="pdc-cc-pane-dot"></div>
      <div>
        <div class="pdc-cc-pane-name">${isAdmin ? nombre : 'Administración PDC'}</div>
        <div class="pdc-cc-pane-email">${isAdmin ? email : 'Soporte · PDC Analytics Center'}</div>
      </div>
    </div>
    <div class="pdc-cc-msgs" id="pdcMsgArea"></div>
    <div class="pdc-cc-input-row">
      <textarea class="pdc-cc-inp" id="pdcInp"
        placeholder="${isAdmin ? 'Responder a '+nombre+'...' : 'Escribe tu mensaje...'}"
        rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button class="pdc-cc-send" id="pdcSendBtn" onclick="sendMsg()">Enviar ↑</button>
    </div>`;

  await loadMessages(email);
}

/* ── Cargar mensajes ── */
async function loadMessages(email){
  const { data, error } = await sb.from('chat_messages')
    .select('*')
    .eq('sender_email', email)
    .order('created_at',{ascending:true});

  if(error){ console.error(error); return; }

  const area = document.getElementById('pdcMsgArea');
  if(!area) return;

  if(!data || !data.length){
    area.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:.76rem;padding:20px;">Sin mensajes aún. ¡Escribe el primero!</div>';
    return;
  }

  area.innerHTML = data.map(m=>{
    const isAdminMsg = m.sender_role === 'admin';
    const text = isAdminMsg
      ? m.message.replace(/^\[To:[^\]]+\]\s*/,'')
      : m.message;
    const t = new Date(m.created_at).toLocaleString('es-GT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    const who = isAdminMsg ? (currentUser.rol==='admin' ? 'Tú (Admin)' : 'Administración PDC') : m.sender_nombre;
    return `<div class="pdc-msg ${isAdminMsg?'admin':'user'}">
      <div class="pdc-msg-bubble">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
      <div class="pdc-msg-meta">${who} · ${t}</div>
    </div>`;
  }).join('');

  requestAnimationFrame(()=>{ area.scrollTop = area.scrollHeight; });
}

/* ── Enviar mensaje ── */
async function sendMsg(){
  const inp = document.getElementById('pdcInp');
  const btn = document.getElementById('pdcSendBtn');
  if(!inp || !activeEmail) return;
  const text = inp.value.trim();
  if(!text) return;

  inp.value = '';
  if(btn) btn.disabled = true;

  const isAdmin = currentUser.rol === 'admin';
  const payload = isAdmin
    ? { sender_email: activeEmail, sender_nombre: currentUser.nombre, sender_role:'admin',
        message:'[To:'+activeEmail+'] '+text, is_read:true }
    : { sender_email: currentUser.email, sender_nombre: currentUser.nombre||currentUser.email,
        sender_role:'user', message:text, is_read:false };

  const { error } = await sb.from('chat_messages').insert(payload);
  if(error){ console.error(error); }

  if(btn) btn.disabled = false;
  await loadMessages(activeEmail);
}

/* Alias para compatibilidad con código legacy */
async function sendReply(){ return sendMsg(); }
</script>
