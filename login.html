<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Acceso Seguro — PDC Analytics Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#002060;--navy2:#003090;--navy3:#001540;--sky:#CFEEFC;--white:#FFFFFF;--bg:#F0F4F8;--text:#0F1729;--text2:#5A6480;--border:#E2E8F0;--red2:#CC0000;--radius:12px}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--navy3);overflow:hidden}
.bg{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy3) 0%,#001d5c 50%,var(--navy3) 100%);z-index:0}
.bg::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(207,238,252,.08) 1px,transparent 1px);background-size:32px 32px}
.bg::after{content:'';position:absolute;top:-20%;right:-10%;width:60%;height:140%;background:linear-gradient(180deg,rgba(0,48,144,.35) 0%,transparent 100%);transform:skewX(-12deg)}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:var(--white);border-radius:20px;box-shadow:0 8px 40px rgba(0,32,96,.16);width:100%;max-width:420px;overflow:hidden;animation:cardIn .4s cubic-bezier(.22,.68,0,1.2) both}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card-header{background:var(--navy);padding:32px 36px 28px;text-align:center}
.logo-wrap{display:inline-flex;align-items:center;justify-content:center;background:var(--white);border-radius:10px;padding:8px 16px;margin-bottom:20px;min-height:52px}
.logo-text{font-size:1.25rem;font-weight:700;color:var(--navy);letter-spacing:.04em}
.card-title{color:var(--white);font-size:1.15rem;font-weight:600;letter-spacing:.02em}
.card-subtitle{color:rgba(207,238,252,.75);font-size:.78rem;margin-top:4px;letter-spacing:.03em}
.card-body{padding:32px 36px 36px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;color:var(--text);background:var(--bg);transition:border-color .15s,box-shadow .15s;outline:none}
.field input:focus{border-color:var(--navy2);box-shadow:0 0 0 3px rgba(0,48,144,.1);background:var(--white)}
.field input::placeholder{color:#b0b8cc}
.error-msg{display:none;align-items:center;gap:8px;background:#fff0f0;border:1px solid #fcc;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:.82rem;color:var(--red2);font-weight:500;animation:shake .3s ease}
.error-msg.visible{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.btn-login{width:100%;padding:13px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-size:.95rem;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:.03em;transition:background .15s,transform .1s}
.btn-login:hover:not(:disabled){background:var(--navy2)}
.btn-login:disabled{opacity:.65;cursor:not-allowed}
.btn-login .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:var(--white);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
.btn-login.loading .btn-label{display:none}
.btn-login.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.card-footer{border-top:1px solid var(--border);padding:14px 36px;display:flex;align-items:center;justify-content:center}
.security-badge{display:flex;align-items:center;gap:5px;font-size:.73rem;color:var(--text2);font-weight:500}
.page-footer{margin-top:24px;text-align:center;color:rgba(207,238,252,.4);font-size:.72rem}
@media(max-width:480px){.card-header{padding:24px 24px 20px}.card-body{padding:24px 24px 28px}}
</style>
</head>
<body>
<div class="bg"></div>
<main class="page">
  <div class="card">
    <div class="card-header">
      <div class="logo-wrap"><span class="logo-text">PDC</span></div>
      <div class="card-title">PDC Analytics Center</div>
      <div class="card-subtitle">Plataforma Corporativa de Business Intelligence</div>
    </div>
    <div class="card-body">
      <div class="error-msg" id="errorMsg" role="alert">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 4.5v4M8 10.5v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="errorText">Correo o contraseña incorrectos.</span>
      </div>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="usuario@grupopdc.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="pass">Contraseña</label>
        <input type="password" id="pass" placeholder="••••••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-login" id="btnLogin" type="button">
        <span class="btn-label">Ingresar</span>
        <span class="spinner"></span>
      </button>
    </div>
    <div class="card-footer">
      <div class="security-badge">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1L1.5 3v3.5C1.5 9.08 3.5 11 6 11s4.5-1.92 4.5-4.5V3L6 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        Sesión segura · Acceso restringido a personal autorizado
      </div>
    </div>
  </div>
  <div class="page-footer">Grupo PDC · Departamento Financiero · © 2026</div>
</main>
<script>

/* ═══════════════════════════════════════════════════════════════
   PDC Analytics Center — Auth System v1.0
   users.js + auth.js — Bloque unificado
   ═══════════════════════════════════════════════════════════════ */

/* ── CONSTANTES ── */
var PDC_SESSION_KEY = 'pdc_session';
var PDC_LOGIN_PAGE  = 'login.html';
var PDC_PORTAL_PAGE = 'analytics.html';
var PDC_SESSION_TTL = 8 * 60 * 60 * 1000;

/* ── DASHBOARDS REGISTRADOS ── */
var PDC_DASHBOARDS = [
  {
    id: 'rutas', nombre: 'Liquidación de Rutas',
    descripcion: 'Monitoreo en tiempo real del estado de liquidación de rutas de despacho. KPIs financieros, análisis por transportista, seguimiento de rutas vencidas y control de efectividad.',
    archivo: 'index.html', icono: '🚚',
    paises: { GT: '🇬🇹 Guatemala', ESV: '🇸🇻 El Salvador', PE: '🇵🇪 Perú', HN: '🇭🇳 Honduras' },
    actualizacion: '11 jun 2026', activo: true
  },
  {
    id: 'cashtoday', nombre: 'Cash Today',
    descripcion: 'Dashboard ejecutivo de recolección de efectivo ATM. Volumetría por sede, costos de servicio, análisis de límites operativos y tráfico de recolección por hora y día.',
    archivo: 'cash_today.html', icono: '💰',
    paises: { GT: '🇬🇹 Guatemala', ESV: '🇸🇻 El Salvador' },
    actualizacion: '11 jun 2026', activo: true
  }
];

/* ── USUARIOS ── */
var PDC_USERS = [
  { email:'juancarlos.escobar@grupopdc.com', pass:'PDC.Admin@2026',     nombre:'Juan Carlos Escobar', rol:'admin',      dashboards:['rutas','cashtoday'], pais:'regional', sedes:'todas' },
  { email:'erwin.soto@grupopdc.com',         pass:'PDC.Sup.Reg@2026',   nombre:'Erwin Soto',          rol:'supervisor', dashboards:['rutas','cashtoday'], pais:'regional', sedes:'todas' },
  { email:'francisco.aguilar@grupopdc.com',  pass:'PDC.Sup.GT@2026',    nombre:'Francisco Aguilar',   rol:'supervisor', dashboards:['rutas','cashtoday'], pais:'GT',       sedes:['CDA'] },
  { email:'liquidaciones.cda@grupopdc.com',  pass:'PDC.TeamGT@2026',    nombre:'TEAM GT',             rol:'consulta',   dashboards:['rutas','cashtoday'], pais:'GT',       sedes:['CDA','XELA'] },
  { email:'edy.lopez@grupopdc.com',          pass:'PDC.Con.GT@2026',    nombre:'Edy Lopez',           rol:'consulta',   dashboards:['rutas'],             pais:'GT',       sedes:['CDA'] },
  { email:'joaquin.palma@grupopdc.com',      pass:'PDC.Con.ESV@2026',   nombre:'Joaquin Palma',       rol:'consulta',   dashboards:['rutas','cashtoday'], pais:'ESV',      sedes:['Sta.Tecla','Sn.Miguel'] },
  { email:'liquidaciones.esv@grupopdc.com',  pass:'PDC.TeamESV@2026',   nombre:'TEAM ESV',            rol:'consulta',   dashboards:['rutas','cashtoday'], pais:'ESV',      sedes:['Sta.Tecla','Sn.Miguel'] },
  { email:'vinicio.sanabria@grupopdc.com',   pass:'PDC.Con.GT2@2026',   nombre:'Vinicio Sanabria',    rol:'consulta',   dashboards:['rutas'],             pais:'GT',       sedes:['CDA'] },
  { email:'claudio.rojas@grupopdc.com',      pass:'PDC.Con.PE@2026',    nombre:'Claudio Rojas',       rol:'consulta',   dashboards:['rutas'],             pais:'PE',       sedes:['Peru'] },
  { email:'jose.mallqui@grupopdc.com',       pass:'PDC.Con.PE2@2026',   nombre:'Jose Mallqui',        rol:'consulta',   dashboards:['rutas'],             pais:'PE',       sedes:['Peru'] },
  { email:'transportes.peru@grupopdc.com',   pass:'PDC.TeamPE@2026',    nombre:'TEAM Peru',           rol:'consulta',   dashboards:['rutas'],             pais:'PE',       sedes:['Peru'] }
];

/* ── FUNCIONES DE USUARIO ── */
function pdcAuthenticate(email, pass) {
  if (!email || !pass) return null;
  var user = null;
  for (var i = 0; i < PDC_USERS.length; i++) {
    if (PDC_USERS[i].email.toLowerCase() === email.trim().toLowerCase() && PDC_USERS[i].pass === pass) {
      user = PDC_USERS[i]; break;
    }
  }
  return user;
}

function pdcGetUserDashboards(user) {
  if (!user) return [];
  return PDC_DASHBOARDS.filter(function(d) {
    return d.activo && user.dashboards.indexOf(d.id) > -1;
  });
}

function pdcIsAdmin(user) { return user && user.rol === 'admin'; }
function pdcIsRegional(user) { return user && user.pais === 'regional'; }

/* ── SESIÓN ── */
function pdcCreateSession(user) {
  var session = {
    email: user.email, nombre: user.nombre, rol: user.rol,
    dashboards: user.dashboards, pais: user.pais, sedes: user.sedes,
    ts: Date.now()
  };
  sessionStorage.setItem(PDC_SESSION_KEY, JSON.stringify(session));
  return session;
}

function pdcGetSession() {
  try {
    var raw = sessionStorage.getItem(PDC_SESSION_KEY);
    if (!raw) return null;
    var session = JSON.parse(raw);
    if (Date.now() - session.ts > PDC_SESSION_TTL) { pdcDestroySession(); return null; }
    return session;
  } catch(e) { pdcDestroySession(); return null; }
}

function pdcDestroySession() { sessionStorage.removeItem(PDC_SESSION_KEY); }

function pdcLogout() {
  pdcDestroySession();
  window.location.href = PDC_LOGIN_PAGE;
}

/* ── GUARDS ── */
function pdcRequireAuth(dashboardId) {
  var session = pdcGetSession();
  if (!session) { window.location.href = PDC_LOGIN_PAGE; return null; }
  if (dashboardId && session.dashboards.indexOf(dashboardId) === -1) {
    window.location.href = PDC_PORTAL_PAGE; return null;
  }
  return session;
}

function pdcRequireAdmin() {
  var session = pdcRequireAuth(null);
  if (!session) return null;
  if (session.rol !== 'admin') { window.location.href = PDC_PORTAL_PAGE; return null; }
  return session;
}

/* ── BRIDGE: pasar sesión a dashboards legacy ── */
function pdcBuildLegacySession(session) {
  return JSON.stringify({ nombre: session.nombre, email: session.email,
    role: session.rol === 'admin' ? 'admin' : 'user' });
}

function pdcNavigateToDash(archivo) {
  var session = pdcGetSession();
  if (!session) { window.location.href = PDC_LOGIN_PAGE; return; }
  sessionStorage.setItem('pdc_user', pdcBuildLegacySession(session));
  window.location.href = archivo;
}

function pdcBridgeToTab(archivo, tab) {
  var session = pdcGetSession();
  if (!session) { window.location.href = PDC_LOGIN_PAGE; return; }
  sessionStorage.setItem('pdc_user', pdcBuildLegacySession(session));
  window.location.href = archivo + '?tab=' + tab;
}

function pdcDownload(archivo, nombre) {
  fetch(archivo)
    .then(function(r) { return r.blob(); })
    .then(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = nombre;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
}

(function(){
  if(pdcGetSession()){window.location.href=PDC_PORTAL_PAGE;return;}
  var emailEl=document.getElementById('email');
  var passEl=document.getElementById('pass');
  var btnEl=document.getElementById('btnLogin');
  var errEl=document.getElementById('errorMsg');
  var errTxt=document.getElementById('errorText');
  emailEl.focus();
  [emailEl,passEl].forEach(function(el){
    el.addEventListener('input',function(){errEl.classList.remove('visible');});
  });
  emailEl.addEventListener('keydown',function(e){if(e.key==='Enter')passEl.focus();});
  passEl.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  btnEl.addEventListener('click',doLogin);
  function doLogin(){
    var email=emailEl.value.trim();
    var pass=passEl.value;
    if(!email||!pass){showError('Ingrese su correo electrónico y contraseña.');return;}
    btnEl.classList.add('loading');btnEl.disabled=true;
    errEl.classList.remove('visible');
    setTimeout(function(){
      var user=pdcAuthenticate(email,pass);
      if(!user){
        btnEl.classList.remove('loading');btnEl.disabled=false;
        showError('Correo o contraseña incorrectos.');
        passEl.value='';passEl.focus();return;
      }
      pdcCreateSession(user);
      window.location.href=PDC_PORTAL_PAGE;
    },350);
  }
  function showError(msg){errTxt.textContent=msg;errEl.classList.add('visible');}
})();
</script>
</body>
</html>
