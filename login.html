<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Seguro — PDC Analytics Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Variables PDC (Style Guide v1.0) ── */
    :root {
      --navy:    #002060;
      --navy2:   #003090;
      --navy3:   #001540;
      --sky:     #CFEEFC;
      --white:   #FFFFFF;
      --bg:      #F0F4F8;
      --text:    #0F1729;
      --text2:   #5A6480;
      --border:  #E2E8F0;
      --red2:    #CC0000;
      --radius:  12px;
      --shadow:  0 2px 16px rgba(0,32,96,.08);
      --shadow-lg: 0 8px 40px rgba(0,32,96,.16);
    }

    /* ── Layout de pantalla completa ── */
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--navy3);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Fondo con patrón geométrico sutil ── */
    .bg-pattern {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, var(--navy3) 0%, #001d5c 50%, var(--navy3) 100%);
      z-index: 0;
    }

    /* Grid decorativo de puntos */
    .bg-pattern::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(207,238,252,.08) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Línea diagonal de acento corporativo */
    .bg-pattern::after {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 60%;
      height: 140%;
      background: linear-gradient(180deg, rgba(0,48,144,.35) 0%, transparent 100%);
      transform: skewX(-12deg);
      pointer-events: none;
    }

    /* ── Contenedor principal ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card de login ── */
    .card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      animation: cardIn .4s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── Header de la card (franja navy) ── */
    .card-header {
      background: var(--navy);
      padding: 32px 36px 28px;
      text-align: center;
    }

    /* Logo PDC — placeholder hasta tener el Base64 */
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      border-radius: 10px;
      padding: 8px 16px;
      margin-bottom: 20px;
      min-height: 52px;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: .04em;
    }

    .card-title {
      color: var(--white);
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: .02em;
      line-height: 1.3;
    }

    .card-subtitle {
      color: rgba(207,238,252,.75);
      font-size: .78rem;
      font-weight: 400;
      margin-top: 4px;
      letter-spacing: .03em;
    }

    /* ── Cuerpo de la card ── */
    .card-body {
      padding: 32px 36px 36px;
    }

    /* ── Campos del formulario ── */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--navy2);
      box-shadow: 0 0 0 3px rgba(0,48,144,.1);
      background: var(--white);
    }

    .field input::placeholder {
      color: #b0b8cc;
    }

    /* ── Mensaje de error ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-size: .82rem;
      color: var(--red2);
      font-weight: 500;
      animation: shake .3s ease;
    }

    .error-msg.visible { display: flex; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* ── Botón de acceso ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: .03em;
      transition: background .15s, transform .1s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover:not(:disabled) {
      background: var(--navy2);
      box-shadow: 0 4px 16px rgba(0,32,96,.25);
    }

    .btn-login:active:not(:disabled) {
      transform: scale(.98);
    }

    .btn-login:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    /* Spinner dentro del botón */
    .btn-login .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading .btn-label { display: none; }
    .btn-login.loading .spinner   { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer de la card ── */
    .card-footer {
      border-top: 1px solid var(--border);
      padding: 14px 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .73rem;
      color: var(--text2);
      font-weight: 500;
    }

    .security-badge svg {
      flex-shrink: 0;
      opacity: .6;
    }

    /* ── Pie de página externo ── */
    .page-footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(207,238,252,.4);
      font-size: .72rem;
      letter-spacing: .04em;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card-header  { padding: 24px 24px 20px; }
      .card-body    { padding: 24px 24px 28px; }
      .card-footer  { padding: 12px 24px; }
    }

    /* ── Reducir movimiento ── */
    @media (prefers-reduced-motion: reduce) {
      .card, .error-msg { animation: none; }
    }
  </style>
</head>
<body>

  <div class="bg-pattern"></div>

  <main class="page">
    <div class="card" role="main">

      <!-- Header -->
      <div class="card-header">
        <div class="logo-wrap">
          <!--
            NOTA DE IMPLEMENTACIÓN:
            Reemplazar el contenido de .logo-wrap por:
            <img src="assets/logo_pdc.png" alt="PDC" height="36" />
            O bien usar el Base64 ya embebido en los dashboards existentes.
          -->
          <span class="logo-text">PDC</span>
        </div>
        <div class="card-title">PDC Analytics Center</div>
        <div class="card-subtitle">Plataforma Corporativa de Business Intelligence</div>
      </div>

      <!-- Formulario -->
      <div class="card-body">

        <div class="error-msg" id="errorMsg" role="alert" aria-live="polite">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 4.5v4M8 10.5v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span id="errorText">Correo o contraseña incorrectos.</span>
        </div>

        <div class="field">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            placeholder="usuario@grupopdc.com"
            autocomplete="email"
            spellcheck="false"
            inputmode="email"
          />
        </div>

        <div class="field">
          <label for="pass">Contraseña</label>
          <input
            type="password"
            id="pass"
            placeholder="••••••••••••"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-login" id="btnLogin" type="button">
          <span class="btn-label">Ingresar</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>

      </div>

      <!-- Footer de la card -->
      <div class="card-footer">
        <div class="security-badge">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1L1.5 3v3.5C1.5 9.08 3.5 11 6 11s4.5-1.92 4.5-4.5V3L6 1z"
                  stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
          Sesión segura · Acceso restringido a personal autorizado
        </div>
      </div>

    </div>

    <div class="page-footer">
      Grupo PDC · Departamento Financiero · &copy; 2026
    </div>
  </main>

  <!-- Dependencias de autenticación -->
  <script src="js/users.js"></script>
  <script src="js/auth.js"></script>

  <script>
    (function () {
      'use strict';

      // Si ya existe sesión válida, redirigir directamente al portal
      if (pdcGetSession()) {
        window.location.href = PDC_PORTAL_PAGE;
        return;
      }

      const emailEl = document.getElementById('email');
      const passEl  = document.getElementById('pass');
      const btnEl   = document.getElementById('btnLogin');
      const errEl   = document.getElementById('errorMsg');
      const errTxt  = document.getElementById('errorText');

      // ── Foco inicial ──
      emailEl.focus();

      // ── Limpiar error al escribir ──
      [emailEl, passEl].forEach(el => {
        el.addEventListener('input', () => errEl.classList.remove('visible'));
      });

      // ── Enter para avanzar entre campos o hacer login ──
      emailEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') passEl.focus();
      });

      passEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });

      btnEl.addEventListener('click', doLogin);

      // ── Función de autenticación ──
      function doLogin() {
        const email = emailEl.value.trim();
        const pass  = passEl.value;

        // Validación básica de campos vacíos
        if (!email || !pass) {
          showError('Ingrese su correo electrónico y contraseña.');
          return;
        }

        // Indicador de carga
        btnEl.classList.add('loading');
        btnEl.disabled = true;
        errEl.classList.remove('visible');

        // Micro-delay para UX (evita flash inmediato)
        setTimeout(() => {
          const user = pdcAuthenticate(email, pass);

          if (!user) {
            btnEl.classList.remove('loading');
            btnEl.disabled = false;
            showError('Correo o contraseña incorrectos.');
            passEl.value = '';
            passEl.focus();
            return;
          }

          // Crear sesión y redirigir al portal
          pdcCreateSession(user);
          window.location.href = PDC_PORTAL_PAGE;

        }, 350);
      }

      function showError(msg) {
        errTxt.textContent = msg;
        errEl.classList.add('visible');
      }

    })();
  </script>

</body>
</html>
