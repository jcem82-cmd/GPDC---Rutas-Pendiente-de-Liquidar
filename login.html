body::before{content:'';position:fixed;inset:0;
  background:linear-gradient(135deg,rgba(0,20,80,0.88) 0%,rgba(0,32,96,0.80) 40%,rgba(100,0,40,0.70) 100%);z-index:0;}
.particles{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(56,189,248,0.4);animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-10vh) translateX(40px);opacity:0;}}
.card{position:relative;z-index:2;background:rgba(255,255,255,0.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:44px 40px 38px;width:100%;max-width:440px;
  box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.05);animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{text-align:center;margin-bottom:28px;}
.logo-wrap img{height:75px;width:auto;background:#fff;border-radius:14px;padding:8px 18px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);transition:transform .3s;}
.logo-wrap img:hover{transform:scale(1.03);}
.title{text-align:center;font-size:1.65rem;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:6px;}
.title span{background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{text-align:center;font-size:.78rem;color:rgba(255,255,255,.45);margin-bottom:32px;letter-spacing:.06em;text-transform:uppercase;}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
.divider span{font-size:.7rem;color:rgba(255,255,255,.3);letter-spacing:.08em;}
.field-label{font-size:.7rem;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:7px;}
.input-wrap{position:relative;margin-bottom:16px;}
.input-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:.95rem;color:rgba(255,255,255,.35);pointer-events:none;}
input[type=email],input[type=password],input[type=text]{width:100%;background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.14);border-radius:12px;color:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.92rem;padding:13px 14px 13px 42px;outline:none;
  transition:border-color .2s,background .2s,box-shadow .2s;}
input::placeholder{color:rgba(255,255,255,.28);}
input:focus{border-color:#38bdf8;background:rgba(56,189,248,0.07);box-shadow:0 0 0 3px rgba(56,189,248,0.12);}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;
  font-size:.9rem;color:rgba(255,255,255,.35);transition:color .2s;user-select:none;}
.eye-btn:hover{color:#38bdf8;}
.btn{width:100%;background:linear-gradient(135deg,#0ea5e9,#4f46e5);border:none;border-radius:12px;color:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:700;padding:15px;cursor:pointer;
  letter-spacing:.05em;margin-top:4px;box-shadow:0 6px 24px rgba(14,165,233,.35);
  transition:transform .15s,box-shadow .15s,opacity .15s;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(14,165,233,.5);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.error-msg{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:10px;
  color:#fca5a5;font-size:.8rem;padding:11px 16px;margin-top:12px;text-align:center;display:none;}
.error-msg.show{display:block;animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}80%{transform:translateX(-4px)}}
.footer{text-align:center;margin-top:22px;font-size:.68rem;color:rgba(255,255,255,.2);line-height:1.6;}
/* Welcome overlay */
.welcome{position:fixed;inset:0;z-index:100;
  background:linear-gradient(135deg,#001240,#002060 50%,#001840);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:0;}
.welcome.show{display:flex;animation:fadeIn .5s ease both;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.w-logo{height:72px;background:#fff;border-radius:14px;padding:6px 16px;margin-bottom:28px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:logoIn .6s cubic-bezier(.16,1,.3,1) .2s both;}
@keyframes logoIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.w-greeting{font-size:1rem;color:rgba(255,255,255,.5);margin-bottom:8px;letter-spacing:.06em;}
.w-name{font-size:2.4rem;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;
  animation:nameIn .7s cubic-bezier(.16,1,.3,1) .3s both;}
@keyframes nameIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.w-role{font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;
  background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:36px;}
.w-progress{width:280px;height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.w-fill{height:100%;width:0%;background:linear-gradient(90deg,#38bdf8,#4f46e5);border-radius:3px;transition:width 2.2s cubic-bezier(.4,0,.2,1);}
.w-msg{font-size:.75rem;color:rgba(255,255,255,.3);margin-top:14px;letter-spacing:.05em;}
</style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

  const btn=document.getElementById('loginBtn');
  err.classList.remove('show');

  if(!email||!pass){err.textContent='Completa todos los campos.';err.classList.add('show');return;}

  const user=USERS.find(u=>u.email.toLowerCase()===email&&u.pass===pass);
  if(!user){
    err.textContent='Correo o contraseña incorrectos.';
    err.classList.add('show');
    document.getElementById('fPass').value='';
    return;
  }

  btn.disabled=true;
  sessionStorage.setItem('pdc_user',JSON.stringify({email:user.email,nombre:user.nombre,role:user.role}));

  const ov=document.getElementById('wOverlay');
  document.getElementById('wName').textContent=user.nombre;
  document.getElementById('wRole').textContent=
    user.role==='admin'?'👑 Administrador':
    user.role==='supervisor'?'🔷 Supervisor':'👤 Consulta';
  ov.classList.add('show');
  setTimeout(()=>document.getElementById('wFill').style.width='100%',100);
  setTimeout(()=>window.location.href='hub.html',2600);
}

['fEmail','fPass'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));
</script>
</body>
</html>
